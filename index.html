<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Temple. Opening soon.</title>
<meta name="description" content="A training facility built for serious athletes. Join the waitlist.">
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --surface: #0A0A0A;
    --text: #E8E8E8;
    --text-dim: rgba(232, 232, 232, 0.55);
    --text-faint: rgba(232, 232, 232, 0.32);
    --brass: #8B7355;
    --brass-bright: #A68A6B;
    --hairline: rgba(232, 232, 232, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* Atmospheric image, kept very low */
  .backdrop {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image: url('nautilus.jpg');
    background-size: cover;
    background-position: center 40%;
    opacity: 0.14;
    filter: grayscale(100%) contrast(1.05) brightness(0.85);
    pointer-events: none;
  }
  .backdrop::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 90% 70% at 50% 38%, transparent 0%, rgba(0,0,0,0.55) 60%, #000 100%),
      linear-gradient(to bottom, rgba(0,0,0,0.4), transparent 30%, transparent 60%, #000 100%);
  }

  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: clamp(3rem, 8vh, 6rem) 1.5rem 3rem;
  }

  .fade {
    opacity: 0;
    transform: translateY(12px);
    animation: enter 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .fade-1 { animation-delay: 0.1s; }
  .fade-2 { animation-delay: 0.35s; }
  .fade-3 { animation-delay: 0.55s; }
  .fade-4 { animation-delay: 0.75s; }
  @keyframes enter {
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .fade { animation: none; opacity: 1; transform: none; }
  }

  .eyebrow {
    font-family: 'Oswald', sans-serif;
    font-weight: 400;
    font-size: 0.72rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: clamp(2rem, 5vh, 3.5rem);
  }

  .logo {
    width: clamp(180px, 30vw, 280px);
    height: auto;
    mix-blend-mode: lighten;
    display: block;
    margin-bottom: clamp(2.5rem, 6vh, 4.5rem);
  }

  h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: clamp(1.6rem, 4.2vw, 2.75rem);
    line-height: 1.25;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    max-width: 21ch;
    margin-bottom: 1.1rem;
  }

  .subline {
    font-family: 'Oswald', sans-serif;
    font-weight: 400;
    font-size: clamp(0.85rem, 1.6vw, 1.05rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: clamp(2.5rem, 6vh, 4rem);
  }

  /* Form */
  .waitlist {
    width: 100%;
    max-width: 460px;
  }
  .field-label {
    display: block;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: left;
    margin-bottom: 0.6rem;
  }
  .field-row {
    display: flex;
    gap: 0;
    border: 1px solid var(--hairline);
    background: var(--surface);
    transition: border-color 0.2s ease;
  }
  .field-row:focus-within {
    border-color: var(--brass);
  }
  input[type="email"] {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    padding: 0.95rem 1.1rem;
  }
  input[type="email"]::placeholder {
    color: var(--text-faint);
  }
  input[type="email"]:focus-visible {
    outline: 2px solid var(--brass);
    outline-offset: -2px;
  }
  button {
    background: var(--brass);
    color: #000;
    border: none;
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 0.82rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0 1.6rem;
    cursor: pointer;
    transition: background 0.2s ease;
    white-space: nowrap;
  }
  button:hover { background: var(--brass-bright); }
  button:focus-visible {
    outline: 2px solid var(--text);
    outline-offset: 2px;
  }
  button:disabled {
    opacity: 0.5;
    cursor: default;
  }

  .form-message {
    min-height: 1.4rem;
    margin-top: 0.7rem;
    font-size: 0.82rem;
    text-align: left;
    color: var(--text-dim);
  }
  .form-message.error { color: #C97B6B; }
  .form-message.success { color: var(--brass-bright); }

  .microcopy {
    margin-top: 0.4rem;
    font-size: 0.75rem;
    color: var(--text-faint);
    text-align: left;
  }

  .credibility {
    margin-top: clamp(3rem, 8vh, 5rem);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  /* Footer */
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--hairline);
    padding: 1.4rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 0.8rem;
    font-size: 0.72rem;
    color: var(--text-faint);
  }
  footer img {
    height: 26px;
    width: auto;
    mix-blend-mode: lighten;
    opacity: 0.45;
  }
  footer .links {
    display: flex;
    gap: 1.4rem;
  }
  footer a {
    color: var(--text-faint);
    text-decoration: none;
  }
  footer a:hover { color: var(--text-dim); }
  footer a:focus-visible {
    outline: 2px solid var(--brass);
    outline-offset: 2px;
  }

  @media (max-width: 480px) {
    .field-row { flex-direction: column; }
    button { padding: 0.95rem 1.6rem; }
    footer { justify-content: center; text-align: center; }
  }
</style>
</head>
<body>

<div class="backdrop" aria-hidden="true"></div>

<main>
  <p class="eyebrow fade fade-1">Opening soon.</p>

  <img class="logo fade fade-2" src="logo.png" alt="Iron Temple" width="280" height="280">

  <h1 class="fade fade-3">A training facility built for serious athletes.</h1>
  <p class="subline fade fade-3">No circuits. No classes. No compromise on equipment.</p>

  <div class="waitlist fade fade-4">
    <label class="field-label" for="email">Email</label>
    <div class="field-row">
      <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" inputmode="email" spellcheck="false">
      <button type="button" id="join-btn">Join the waitlist</button>
    </div>
    <p class="form-message" id="form-message" role="status" aria-live="polite"></p>
    <p class="microcopy">No spam. One email when the doors open.</p>
  </div>

  <p class="credibility fade fade-4">Equipped by Prime Fitness. Nautilus. Newtech.</p>
</main>

<footer>
  <img src="logo.png" alt="" aria-hidden="true">
  <span>Built in Mol by Louis Bartholomeus</span>
  <span class="links">
    <a href="#">[Owner: contact]</a>
    <a href="#">[Owner: instagram]</a>
  </span>
</footer>

<script>
  // [Owner: replace these two constants with your Supabase project values]
  const SUPABASE_URL = '[Owner: SUPABASE_URL]';        // e.g. https://xxxx.supabase.co
  const SUPABASE_ANON_KEY = '[Owner: SUPABASE_ANON_KEY]';

  const SOURCE = 'iron-temple-prelaunch';

  const input = document.getElementById('email');
  const btn = document.getElementById('join-btn');
  const msg = document.getElementById('form-message');

  function setMessage(text, type) {
    msg.textContent = text;
    msg.className = 'form-message' + (type ? ' ' + type : '');
  }

  function isValidEmail(value) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(value);
  }

  async function submit() {
    const email = input.value.trim().toLowerCase();

    if (!isValidEmail(email)) {
      setMessage('Enter a valid email address.', 'error');
      input.focus();
      return;
    }

    btn.disabled = true;
    setMessage('');

    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/waitlist', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ email: email, source: SOURCE })
      });

      if (res.status === 201) {
        setMessage('You are on the list.', 'success');
        input.value = '';
      } else if (res.status === 409) {
        setMessage('This email is already on the list.', 'success');
      } else {
        setMessage('Something went wrong. Try again in a moment.', 'error');
      }
    } catch (err) {
      setMessage('No connection. Check your network and try again.', 'error');
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', submit);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') submit();
  });
</script>

</body>
</html>
